
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setal=\E[58:2::%p1%{65536}%/%d:%p1%{256}%/%{255}%&%d:%p1%{255}%&%dm'
set -as terminal-features ',*:usstyle'

set-option -g prefix C-SPACE
unbind C-b
bind-key C-SPACE send-prefix
bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1
set -g pane-base-index 1
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g detach-on-destroy off

set -g renumber-windows on
setw -g mode-keys vi

set -g status-position top
set -g status-justify left
set -g status-style 'bg=default fg=colour7'
set -g status-left ''
set -g status-right '#[fg=colour7]#S '
set -g status-left-length 20

setw -g window-status-current-style 'fg=colour2 bold'
setw -g window-status-current-format '#I:#W '
setw -g window-status-style 'fg=colour7'

bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r K resize-pane -U 10
bind -r J resize-pane -D 10
bind -r H resize-pane -L 10
bind -r L resize-pane -R 10

bind-key b set-option status
bind-key f run-shell "${HOME}/.config/tmux/tmux-sessionizer.sh"
bind-key S run-shell "${HOME}/.config/tmux/ssh-sessionizer.sh"
bind-key -n C-_ run-shell "${HOME}/.config/tmux/tmux-toggle-popup.sh"

bind-key o switch-client -l

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'


run '~/.tmux/plugins/tpm/tpm'
